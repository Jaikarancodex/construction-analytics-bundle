bundle:
  name: construction-analytics

include:
  - resources/*.yml

workspace:
  host: https://adb-7488500312027058.18.azuredatabricks.net

variables:
  catalog_name:
    description: Unity Catalog name
    default: construction_demo

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog_name: construction_demo
    workspace:
      root_path: /Workspace/Users/${{workspace.current_user.userName}}/.bundle/${{bundle.name}}/${{bundle.target}}

  staging:
    mode: development
    variables:
      catalog_name: construction_staging

  prod:
    mode: production
    variables:
      catalog_name: construction_prod
    run_as:
      user_name: jaikaran.n@diggibyte.com
